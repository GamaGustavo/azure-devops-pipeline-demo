name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  AZURE_RESOURCE_GROUP: devops-demo-rg
  AZURE_CONTAINER_REGISTRY: devopsdemoacr
  AZURE_LOCATION: brazilsouth
  IMAGE_NAME: devops-demo-app

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd app
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        cd app
        python -m pytest tests/ -v --tb=short
    
    - name: Build Docker image
      run: |
        docker build -t ${{ env.IMAGE_NAME }}:latest app/
    
    - name: Run container locally (health check)
      run: |
        docker run -d -p 5000:5000 --name test-app ${{ env.IMAGE_NAME }}:latest
        sleep 5
        curl http://localhost:5000/health || exit 1
        docker stop test-app
        docker rm test-app     

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.9.0
    
    - name: Terraform init
      run: |
        cd infra/terraform
        terraform init
    
    - name: Terraform validate
      run: |
        cd infra/terraform
        terraform validate
   
    - name: Debug - Show environment variables (masked)
      run: |
        echo "Resource Group: ${{ env.AZURE_RESOURCE_GROUP }}"
        echo "ACR: ${{ env.AZURE_CONTAINER_REGISTRY }}"
        echo "Location: ${{ env.AZURE_LOCATION }}"
        echo "Client ID (masked): ***${{ secrets.AZURE_CLIENT_ID }}"    
    
    - name: Terraform plan (debug mode)
      run: |
        cd infra/terraform
        terraform plan -var="location=${{ env.AZURE_LOCATION }}" -var="acr_username=${{ secrets.AZURE_CLIENT_ID }}" -var="acr_password=${{ secrets.AZURE_CLIENT_SECRET }}" -var="image_tag=latest" -no-color
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        timeout-minutes: 5

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment: staging
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io
        username: ${{ secrets.AZURE_CLIENT_ID }}
        password: ${{ secrets.AZURE_CLIENT_SECRET }}
    
    - name: Build and push Docker image
      run: |
        docker build -t ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} app/
        docker push ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
    
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Deploy to Azure Container Instance (Staging)
      run: |
        az container create \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --name devops-demo-staging \
          --image ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          --dns-name-label devops-demo-staging-${{ github.run_number }} \
          --ports 5000 \
          --registry-login-server ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io \
          --registry-username ${{ secrets.AZURE_CLIENT_ID }} \
          --registry-password ${{ secrets.AZURE_CLIENT_SECRET }}
    
    - name: Get staging URL
      run: |
        STAGING_URL=$(az container show --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --name devops-demo-staging --query ipAddress.fqdn -o tsv)
        echo "Staging URL: http://${STAGING_URL}:5000"
        echo "STAGING_URL=http://${STAGING_URL}:5000" >> $GITHUB_ENV

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Deploy to Azure Container Instance (Production)
      run: |
        az container create \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --name devops-demo-prod \
          --image ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          --dns-name-label devops-demo-prod \
          --ports 5000 \
          --registry-login-server ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io \
          --registry-username ${{ secrets.AZURE_CLIENT_ID }} \
          --registry-password ${{ secrets.AZURE_CLIENT_SECRET }}
    
    - name: Get production URL
      run: |
        PROD_URL=$(az container show --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --name devops-demo-prod --query ipAddress.fqdn -o tsv)
        echo "Production URL: http://${PROD_URL}:5000"
        echo "PRODUCTION_URL=http://${PROD_URL}:5000" >> $GITHUB_ENV
